<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./zerowear.jpeg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>zero_wear</title>
    <script>
      // Applied before React mounts to prevent a flash of the wrong theme
      // on page load. Mirrors the same storage key used by useTheme.js.
      (function () {
        try {
          var stored = localStorage.getItem('zw_theme');
          var prefersDark = window.matchMedia(
            '(prefers-color-scheme: dark)'
          ).matches;
          var isDark = stored ? stored === 'dark' : prefersDark;
          if (isDark) document.documentElement.classList.add('dark');
        } catch (e) {
          // localStorage unavailable — default to light, no crash
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
